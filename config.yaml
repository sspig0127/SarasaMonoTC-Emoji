# Lite variant — monochrome glyf emoji
# Emoji source: Noto Emoji variable font (google/fonts repo, SIL OFL)
#   Download: https://github.com/google/fonts/raw/main/ofl/notoemoji/NotoEmoji%5Bwght%5D.ttf
#   Place at: fonts/NotoEmoji[wght].ttf  (size: ~1.9 MB)
# Benefits: ~60% smaller files, full Chromium/VHS/xterm.js compatibility,
#           emoji render in terminal foreground color, syncs with Unicode releases yearly (September)
lite:
  family_name: "SarasaMonoTCEmojiLite"
  emoji_font: "NotoEmoji[wght].ttf"
  output_dir: "output/fonts-lite"
  description: "Sarasa Mono TC (更紗黑體繁中等寬) with embedded Noto Emoji — monochrome emoji for VHS recording and lightweight terminals"
  # Lite 旗幟不再使用白名單控制。
  # 所有標準 Regional Indicator 雙碼國旗 sequence 都會套用
  # 2-column 自訂旗面 + 壓縮字母設計。

# COLRv1 variant — color vector emoji
# Emoji source: Noto COLRv1 font (googlefonts/noto-emoji, SIL OFL)
#   Download: https://github.com/googlefonts/noto-emoji/blob/main/fonts/Noto-COLRv1.ttf
#   Place at: fonts/Noto-COLRv1.ttf  (size: ~4.8 MB)
# Benefits: ~15 MB output (vs ~35 MB CBDT), scalable vector, Chrome/Chromium 98+ support
colrv1:
  family_name: "SarasaMonoTCEmojiCOLRv1"
  emoji_font: "Noto-COLRv1.ttf"
  output_dir: "output/fonts-colrv1"
  description: "Sarasa Mono TC (更紗黑體繁中等寬) with embedded Noto COLRv1 — color vector emoji for Chrome/Chromium terminals"
  # Greedy glyph budget: limits total new glyph slots (emoji stubs + geometry deps).
  # Noto-COLRv1 has ~1,400 single-codepoint emoji; the full set causes browser/OTS
  # garbling due to oversized glyph tables.
  # 8450 = safe upper bound (65535 − 56905 max-style glyphs − 180 buffer).
  # Increased from 8136 (2026-04-05): +314 slots for priority emoji expansion.
  max_new_glyphs: 8450
  # Path for the generated emoji selection list (committed to repo for reference).
  emoji_list_path: "docs/colrv1-emoji-list.json"
  # Priority codepoints: always selected before the greedy fill phase,
  # regardless of their codepoint value.
  #
  # Background: The greedy phase selects emoji in codepoint ascending order
  # (lower = older = historically more common).  This causes commonly used
  # GitHub/programming-doc emoji at U+1F500–U+1F9FF to be cut off, because
  # the budget is exhausted by lower-codepoint emoji first.
  #
  # Selection criteria for this list:
  #   1. NOT already in Sarasa Mono TC's cmap — BMP symbols such as ⚠️ (U+26A0),
  #      ⚙️ (U+2699), ❌ (U+274C), ➡️ (U+27A1) are in Sarasa as text glyphs
  #      (monochrome), so they are NOT candidates and do not need to be listed here.
  #   2. Commonly seen in GitHub READMEs, Issues, PR descriptions, CI badge tables,
  #      and programming documentation — verified against real-world usage.
  #   3. All have zero geometry deps (cost = 1 glyph slot each), so adding 27
  #      priority emoji consumes only 27 of the 8,136 budget.
  #
  # To customise: add or remove "U+XXXX" entries.  Run `uv run python build.py --colrv1`
  # to rebuild; the updated selection is written to docs/colrv1-emoji-list.json.
  #
  # force_colrv1_codepoints — BMP symbols that Sarasa already renders monochrome.
  # Listed here, their cmap entry is redirected to a COLRv1 stub (e.g. uni2764 →
  # uni2764_colrv1), overriding skip_existing for these specific codepoints.
  # Verified present in both Sarasa and Noto-COLRv1 (2026-03-29).
  # Each entry consumes greedy budget; keep list small.
  # NOTE: 此清單與 emoji.force_color_codepoints 已不同步（2026-04-06）。
  # Color 變體新增了 103 項擴充清單（BMP + 非 BMP），但 COLRv1 budget 接近上限
  # （剩餘 ~123 slots），故 COLRv1 維持原有 15 項，不擴充。
  force_colrv1_codepoints:
    - "U+21A9"  # ↩ leftwards arrow with hook
    - "U+2328"  # ⌨ keyboard
    - "U+2600"  # ☀ black sun with rays
    - "U+2601"  # ☁ cloud
    - "U+2699"  # ⚙ gear / settings
    - "U+2744"  # ❄ snowflake
    - "U+274C"  # ❌ cross mark
    - "U+27A1"  # ➡ black rightwards arrow
    - "U+2764"  # ❤ heart
    - "U+2B06"  # ⬆ upwards black arrow
    - "U+2B07"  # ⬇ downwards black arrow
    - "U+2B50"  # ⭐ star
    - "U+26A0"  # ⚠ warning sign
    - "U+263A"  # ☺ smiling face
    - "U+26A1"  # ⚡ high voltage / lightning

  priority_codepoints:
    - "U+1F50D"  # 🔍 magnifying glass left
    - "U+1F50E"  # 🔎 magnifying glass right
    - "U+1F511"  # 🔑 key
    - "U+1F512"  # 🔒 locked
    - "U+1F513"  # 🔓 unlocked
    - "U+1F514"  # 🔔 bell
    - "U+1F516"  # 🔖 bookmark
    - "U+1F517"  # 🔗 link
    - "U+1F519"  # 🔙 BACK arrow
    - "U+1F527"  # 🔧 wrench
    - "U+1F528"  # 🔨 hammer
    - "U+1F534"  # 🔴 red circle
    - "U+1F535"  # 🔵 blue circle
    - "U+1F550"  # 🕐 one o'clock
    - "U+1F5A5"  # 🖥️ desktop computer
    - "U+1F5B1"  # 🖱️ computer mouse
    - "U+1F5C2"  # 🗂️ card index dividers
    - "U+1F5C3"  # 🗃️ card file box
    - "U+1F64C"  # 🙌 raising hands
    - "U+1F680"  # 🚀 rocket
    - "U+1F6E0"  # 🛠️ hammer and wrench
    - "U+1F6E1"  # 🛡️ shield
    - "U+1F7E1"  # 🟡 yellow circle
    - "U+1F7E2"  # 🟢 green circle
    - "U+1F91D"  # 🤝 handshake
    # 常用通用 emoji
    - "U+1F525"  # 🔥 fire
    - "U+1F600"  # 😀 grinning face
    # 文具 / 書本系列（2026-04-05 擴增）
    - "U+1F4CF"  # 📏 straight ruler
    - "U+1F4D0"  # 📐 triangular ruler
    - "U+1F4DD"  # 📝 memo
    - "U+1F4DC"  # 📜 scroll
    - "U+1F4D5"  # 📕 closed book
    - "U+1F4D7"  # 📗 green book
    - "U+1F4D8"  # 📘 blue book
    - "U+1F4D9"  # 📙 orange book
    - "U+1F4D4"  # 📔 notebook with decorative cover
    - "U+1F551"  # 🕑 clock face two o'clock
  # priority_sequences — high-value sequence emoji to attempt before the
  # remaining-budget greedy fill for COLRv1 sequence support.
  # Format: space-separated codepoint sequence.
  # Order matters: earlier entries are attempted first.
  priority_sequences:
    # 核心職業 / 家庭 / 膚色樣本
    - "U+1F469 U+200D U+1F4BB"  # 👩‍💻 woman technologist
    - "U+1F468 U+200D U+1F4BB"  # 👨‍💻 man technologist
    - "U+1F469 U+200D U+1F52C"  # 👩‍🔬 woman scientist
    - "U+1F468 U+200D U+1F469 U+200D U+1F467 U+200D U+1F466"  # 👨‍👩‍👧‍👦 family
    - "U+1F44B U+1F3FB"         # 👋🏻 waving hand: light skin tone
    - "U+1F44D U+1F3FD"         # 👍🏽 thumbs up: medium skin tone
    # 核心旗幟：以臺灣情境最高頻為先
    - "U+1F1F9 U+1F1FC"         # 🇹🇼 Taiwan flag
    - "U+1F1EF U+1F1F5"         # 🇯🇵 Japan flag
    - "U+1F1FA U+1F1F8"         # 🇺🇸 United States flag
    - "U+1F1E8 U+1F1F3"         # 🇨🇳 China flag
    # 第二批旗幟：以臺灣常見新聞、旅遊、商務、移居情境優先
    - "U+1F1F0 U+1F1F7"         # 🇰🇷 South Korea flag
    - "U+1F1F8 U+1F1EC"         # 🇸🇬 Singapore flag
    - "U+1F1ED U+1F1F0"         # 🇭🇰 Hong Kong SAR China flag
    - "U+1F1F9 U+1F1ED"         # 🇹🇭 Thailand flag
    - "U+1F1FB U+1F1F3"         # 🇻🇳 Vietnam flag
    - "U+1F1F5 U+1F1ED"         # 🇵🇭 Philippines flag
    - "U+1F1E8 U+1F1E6"         # 🇨🇦 Canada flag
    - "U+1F1E6 U+1F1FA"         # 🇦🇺 Australia flag
    - "U+1F1EC U+1F1E7"         # 🇬🇧 United Kingdom flag
    # 膚色變體 + ZWJ 低成本 sequence（2026-04-05 擴增，cost=1×220 + cost=2×1）
    - "U+26F9 U+1F3FB"  # ⛹🏻 膚色變體
    - "U+26F9 U+1F3FC"  # ⛹🏼 膚色變體
