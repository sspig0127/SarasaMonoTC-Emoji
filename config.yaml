    # --- 擴充清單：修復 CBLC name-conflict 導致的彩色遺失（2026-04-06） ---
    # 來源：_filter_cblc_to_added_glyphs 診斷，確認存在於 NotoColorEmoji + Noto-COLRv1
    # 符號與標點
    - "U+203C"  # ‼ double exclamation mark
    - "U+2049"  # ⁉ exclamation question mark
    - "U+2139"  # ℹ information
    - "U+24C2"  # Ⓜ circled M
    # 方向箭頭
    - "U+21AA"  # ↪ right arrow with hook
    - "U+2194"  # ↔ left right arrow
