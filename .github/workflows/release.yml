name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: '發佈標籤（如 v2.3.0）'
        required: true
      sarasa_version:
        description: 'Sarasa Gothic 版本號'
        required: false
        default: '1.0.37'
      nerd_fonts_version:
        description: 'Nerd Fonts 版本號（Symbols Only）'
        required: false
        default: '3.4.0'
      noto_emoji_version:
        description: 'Noto Emoji 版本號（NotoColorEmoji / Noto-COLRv1；對應 upstream-versions.json）'
        required: false
        default: '2.051'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允許建立 Release 與上傳附件

    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag }}
      SARASA_VERSION: ${{ github.event.inputs.sarasa_version }}
      NERD_FONTS_VERSION: ${{ github.event.inputs.nerd_fonts_version }}
      NOTO_EMOJI_VERSION: ${{ github.event.inputs.noto_emoji_version }}

    steps:
      - uses: actions/checkout@v4

      - name: 安裝系統工具
        run: sudo apt-get install -y p7zip-full

      - name: 快取來源字體
        id: cache-fonts
        uses: actions/cache@v5
        with:
          path: fonts/
          key: fonts-sarasa-${{ github.event.inputs.sarasa_version }}-nerd-${{ github.event.inputs.nerd_fonts_version }}-noto-${{ github.event.inputs.noto_emoji_version }}

      - name: 下載來源字體（cache miss 時執行）
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: |
          mkdir -p fonts

          # Sarasa Mono TC 專用壓縮包（僅含 TC Mono 四個樣式，~30 MB，比全量包小很多）
          curl -fL -o sarasa-tc.7z \
            "https://github.com/be5invis/Sarasa-Gothic/releases/download/v${SARASA_VERSION}/SarasaMonoTC-TTF-${SARASA_VERSION}.7z"

          # 解壓縮全部檔案（TC 包內只有 TC Mono TTF，不需要篩選）
          7za e sarasa-tc.7z -ofonts/ -y
          rm -f sarasa-tc.7z

          echo "=== Extracted Sarasa fonts ==="
          ls fonts/SarasaMonoTC-*.ttf

          # Noto Color Emoji（Color 變體）—— pin 到 noto-emoji tag
          curl -fL -o fonts/NotoColorEmoji.ttf \
            "https://github.com/googlefonts/noto-emoji/raw/v${NOTO_EMOJI_VERSION}/fonts/NotoColorEmoji.ttf"

          # Noto Emoji variable（Lite 變體）
          # NotoEmoji[wght].ttf 只在 google/fonts monorepo，該 repo 無 per-font tag，無法版本 pin
          curl -fL -o "fonts/NotoEmoji[wght].ttf" \
            "https://github.com/google/fonts/raw/main/ofl/notoemoji/NotoEmoji%5Bwght%5D.ttf"

          # Noto COLRv1（COLRv1 變體）—— pin 到 noto-emoji tag
          curl -fL -o fonts/Noto-COLRv1.ttf \
            "https://github.com/googlefonts/noto-emoji/raw/v${NOTO_EMOJI_VERSION}/fonts/Noto-COLRv1.ttf"

          # Symbols Nerd Font Mono（Nerd Lite 變體）
          mkdir -p fonts/NerdFontsSymbolsOnly
          curl -fL -o /tmp/NerdFontsSymbolsOnly.zip \
            "https://github.com/ryanoasis/nerd-fonts/releases/download/v${NERD_FONTS_VERSION}/NerdFontsSymbolsOnly.zip"
          unzip -j /tmp/NerdFontsSymbolsOnly.zip "SymbolsNerdFontMono-Regular.ttf" \
            -d fonts/NerdFontsSymbolsOnly/
          rm -f /tmp/NerdFontsSymbolsOnly.zip

      - name: 確認字體檔案完整
        run: |
          for f in \
            fonts/SarasaMonoTC-Regular.ttf \
            fonts/SarasaMonoTC-Italic.ttf \
            fonts/SarasaMonoTC-Bold.ttf \
            fonts/SarasaMonoTC-BoldItalic.ttf \
            fonts/NotoColorEmoji.ttf \
            "fonts/NotoEmoji[wght].ttf" \
            fonts/Noto-COLRv1.ttf \
            fonts/NerdFontsSymbolsOnly/SymbolsNerdFontMono-Regular.ttf; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing font: $f" && exit 1
            fi
            echo "OK: $f ($(du -sh "$f" | cut -f1))"
          done

      - name: 安裝 uv
        uses: astral-sh/setup-uv@v4

      - name: 安裝 Python 依賴
        run: |
          uv python install 3.10
          uv sync --group dev

      - name: 執行測試
        run: uv run pytest tests/ -v --tb=short

      - name: 建構 Color 變體
        run: uv run python build.py

      - name: 建構 Lite 變體
        run: uv run python build.py --lite

      - name: 建構 COLRv1 變體
        run: uv run python build.py --colrv1

      - name: 建構 Nerd Lite 變體
        run: uv run python build.py --nerd-lite

      - name: 確認 manifest 版本號
        run: |
          for manifest in \
            output/fonts/fonts-manifest.json \
            output/fonts-lite/fonts-manifest.json \
            output/fonts-colrv1/fonts-manifest.json \
            output/fonts-nerd-lite/fonts-manifest.json; do
            version=$(python3 -c "import json; print(json.load(open('${manifest}'))['version'])")
            echo "${manifest}: ${version}"
          done

      - name: 打包 zip
        run: |
          cd output
          zip -r "../SarasaMonoTCEmoji-${RELEASE_TAG}.zip"            fonts/
          zip -r "../SarasaMonoTCEmojiLite-${RELEASE_TAG}.zip"      fonts-lite/
          zip -r "../SarasaMonoTCEmojiCOLRv1-${RELEASE_TAG}.zip"    fonts-colrv1/
          zip -r "../SarasaMonoTCEmojiLiteNerd-${RELEASE_TAG}.zip"  fonts-nerd-lite/
          cd ..
          ls -lh SarasaMonoTCEmoji-*.zip

      - name: 上傳至 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" &>/dev/null; then
            echo "Release ${RELEASE_TAG} 已存在，附加 zip 附件..."
            gh release upload "${RELEASE_TAG}" \
              "SarasaMonoTCEmoji-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiLite-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiCOLRv1-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiLiteNerd-${RELEASE_TAG}.zip" \
              --clobber
          else
            echo "Release ${RELEASE_TAG} 不存在，建立 draft release..."
            gh release create "${RELEASE_TAG}" --draft \
              --title "SarasaMonoTCEmoji ${RELEASE_TAG}" \
              "SarasaMonoTCEmoji-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiLite-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiCOLRv1-${RELEASE_TAG}.zip" \
              "SarasaMonoTCEmojiLiteNerd-${RELEASE_TAG}.zip"
          fi
