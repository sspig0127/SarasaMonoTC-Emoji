    - "U+270A U+1F3FB"  # ✊🏻 膚色變體
    - "U+270A U+1F3FC"  # ✊🏼 膚色變體
    - "U+270A U+1F3FD"  # ✊🏽 膚色變體
    - "U+270A U+1F3FE"  # ✊🏾 膚色變體
    - "U+270A U+1F3FF"  # ✊🏿 膚色變體
